spring.application.name=amazon

# ===================================================================
# SERVER CONFIGURATION
# ===================================================================
# Defines the port your Spring Boot application will run on (Default is 8080)
server.port=8081

# ===================================================================
# DATABASE CONNECTION CONFIGURATION (MYSQL)
# ===================================================================

# 1. The URL connecting to your database.
spring.datasource.url=jdbc:mysql://host.docker.internal:3306/5th_jan_batch

# 2. Your database credentials
spring.datasource.username=root
spring.datasource.password=2122

# 3. MySQL Driver class
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===================================================================
# JPA / HIBERNATE CONFIGURATION
# ===================================================================

# Controls database table creation. 
spring.jpa.hibernate.ddl-auto=update

# Modern MySQL dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# SQL Logging configuration for the console
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true